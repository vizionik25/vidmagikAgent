services:
  vidmagik-mcp:
    build: .
    stdin_open: true
    volumes:
      - ./media:/app/media
    environment:
      - PYTHONUNBUFFERED=1

  shorts-creator:
    build:
      context: .
      dockerfile: src/app/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./media:/app/media
    depends_on:
      - vidmagik-mcp
    environment:
      - PYTHONUNBUFFERED=1
      - NICEGUI_HOST=0.0.0.0
      - MCP_SERVER_URL=http://vidmagik-mcp:8080/mcp
